<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>
    <h1>Super herói</h1>
    <form action="" method="">
        <label for="nome">Nome:</label>
        <input type="text" name="nome" id="nome" placeholder="Insira o nome do herói"><br>
        <label>Poder:</label>
        <input type="text" name="poder" id="poder" placeholder="Insira o poder do herói">
        <br>
        <label>Idade:</label><input type="number" name="idade" id="idade" step="10" max="1000" min="0"
            placeholder="Insira a idade do herói">
        <br>
        <label>E-mail</label><input type="email" name="email" id="email" placeholder="Insira o e-mail do herói">
        <br>
        <label for="salvar_mundo">Aceito salvar o mundo</label><input type="checkbox" name="salvar_mundo"
            id="salvar_mundo">
        <br>
        <input type="radio" name="lado" value="H" id="lado_H">
        <label for="lado_H">Herói</label><br>
        <input type="radio" name="lado" value="V" id="lado_V"><label for="lado_V">Vilão</label>
        <br>
        <label for="color">Indique sua cor</label> <input type="color" name="color" id="color" value="#FFFFFF">
        <br>
        <label for="level">Qual seu nível</label> <input type="range" name="level" id="level" value="0" step="10">
    </form>
</body>

</html>
