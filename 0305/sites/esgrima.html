    <p>A esgrima é um esporte de luta, onde o objetivo é <b>tocar</b> o adversário com o florete, assim ganhando <i>um
            ponto</i>, no
        final do tempo, quem tiver mais pontos <b>ganha</b>. O
        esporte é focado na <i>agilidade</i> de pensamento e <i>reflexo</i>, e na dispersão dos ataques do inimigo</p>
