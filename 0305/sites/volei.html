    <a href="index.html">Voltar</a>

    <p>Vôlei é um esporte de quadra dividida, onde há uma rede alta no meio da quadra, e o objetivo é <b>fazer a bola
            cair</b>
        no <i>outro lado</i> da quadra. Todos os pontos valem 1 ponto, e há 6 pessoas em cada time.</p>
