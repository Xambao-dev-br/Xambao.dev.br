    <h1>Tênis de Mesa</h1>
    <a href="index.html">Voltar</a>
    <hr>
    <p>O tênis de mesa é um esporte de rede e parede, com o objetivo de lançar a bola para o outro lado, fazendo ela
        bater uma vez <b>obrigatoriamente</b> na mesa do lado do <i>oponente</i>, e por fim fazendo ela bater novamente
        em <b>qualquer</b>
        superfície, <u>desde que não seja no seu lado da mesa.</u> </p>
