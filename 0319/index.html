<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h2>Cadastro do Festival da Escola</h2>
        <ul type="none">
            <li>
                <input type="radio" value="M" name="atividade" id="musica"><label for="musica">Música</label>
            </li>
            <li><input type="radio" value="D" name="atividade" id="danca"><label for="danca">Dança</label></li>
            <li><input type="radio" value="T" name="atividade" id="teatro"><label for="teatro">Teatro</label></li>
        </ul>

        <input readonly type="text" name="nome" id="nome" placeholder="Digite seu Nome">

        <select name="festival_atividade" id="festival_atividade">
            <option disabled selected value="-1">Selecione uma atividade</option>
            <option value="M">Música</option>
            <option value="D">Dança</option>
            <option value="T">Teatro</option>
        </select>
        <textarea name="textarea" id="textarea" rows="10" cols="40"></textarea>

        <br>
        <input type="reset" value="Clique Aqui" >
        <button type="reset"><b>Clique aqui</b></button>
    </form>
</body>
</html>
