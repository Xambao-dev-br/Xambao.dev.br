<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>

<body>
    <h1>Tabelas uhuuul</h1>
    <table border="1">
        <caption>Relação de participantes</caption>
        <tr>
            <th colspan="2">Informações do participante</th>
        </tr>
        <tr>
            <td colspan="1">Murilo</td>
            <td>15</td>
        </tr>
        <tr>
            <td>Otávio</td>
            <td>17</td>
        </tr>
    </table>
    <table border="1">
        <caption>Alunos reprovados em disciplinas</caption>
        <thead id="dados">
            <tr>
                <th>Aluno</th>
                <th>Disciplina</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">Bruno</td>
                <td>Matemática</td>
            </tr>
            <tr>
                <td>Algoritmos</td>
            </tr>
        </tbody>

    </table>
</body>


</html>
